name: deploy-tweety
description: "Build, upload, health-check — then wait for human approval to promote"
concurrency_group: tweety-deploy

stages:
  - id: build
    label: "Build & Package"
    steps:
      - type: bash
        id: install
        label: "Install dependencies"
        command: bun install

  - id: deploy
    label: "Deploy to Preview"
    depends_on:
      - build
    steps:
      - type: slot-provision
        id: provision

      - type: slot-upload
        id: upload
        install_cmd: bun install

      - type: slot-health
        id: health

  - id: gate
    label: "Approval Gate"
    depends_on:
      - deploy
    steps:
      - type: approval
        id: approve
        message: "Tweety preview deployed — promote to production?"

finally:
  - id: cleanup
    run_on: on_failure
    steps:
      - type: slot-cleanup
        id: cleanup
