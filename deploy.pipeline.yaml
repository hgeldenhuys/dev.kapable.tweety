name: deploy-tweety
description: "Build, upload, health-check, and promote Tweety canary app"
concurrency_group: tweety-deploy

variables:
  API_URL: "https://api.kapable.dev"
  APP_ID: ""
  DEPLOY_TOKEN: ""
  RUN_ID_SHORT: ""
  SLOT_NAME: "preview-${{ variables.RUN_ID_SHORT }}"
  PORT: "3000"
  ENV_NAME: "production"

stages:
  - id: build
    label: "Build & Package"
    steps:
      - type: bash
        id: install
        label: "Install dependencies"
        command: bun install

      - type: bash
        id: package
        label: "Create deployment tarball"
        command: |
          tar czf /tmp/tweety-deploy.tar.gz \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=dist \
            -C . .
          echo "Tarball size: $(du -h /tmp/tweety-deploy.tar.gz | cut -f1)"

  - id: provision
    label: "Provision Slot"
    depends_on:
      - build
    steps:
      - type: bash
        id: create-slot
        label: "Create preview slot with container"
        command: |
          RESP=$(curl -sf -X POST \
            "${{ variables.API_URL }}/v1/apps/${{ variables.APP_ID }}/environments/${{ variables.ENV_NAME }}/slots" \
            -H "x-api-key: ${{ variables.DEPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "slot_name": "${{ variables.SLOT_NAME }}",
              "weight": 0,
              "provision": {"source": "fresh"}
            }')
          echo "$RESP" | jq .

  - id: deploy
    label: "Upload & Verify"
    depends_on:
      - provision
    steps:
      - type: bash
        id: upload
        label: "Upload tarball to slot"
        command: |
          curl -sf -X POST \
            "${{ variables.API_URL }}/v1/apps/${{ variables.APP_ID }}/environments/${{ variables.ENV_NAME }}/slots/${{ variables.SLOT_NAME }}/upload?install_cmd=bun+install&port=${{ variables.PORT }}" \
            -H "x-api-key: ${{ variables.DEPLOY_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @/tmp/tweety-deploy.tar.gz \
          | jq .

      - type: bash
        id: health
        label: "Wait for healthy"
        command: |
          RESP=$(curl -sf -X POST \
            "${{ variables.API_URL }}/v1/apps/${{ variables.APP_ID }}/environments/${{ variables.ENV_NAME }}/slots/${{ variables.SLOT_NAME }}/health" \
            -H "x-api-key: ${{ variables.DEPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "path": "/health",
              "port": ${{ variables.PORT }},
              "max_attempts": 30,
              "interval_ms": 1000
            }')
          echo "$RESP" | jq .
          HEALTHY=$(echo "$RESP" | jq -r '.healthy')
          if [ "$HEALTHY" != "true" ]; then
            echo "ERROR: Health check failed after $(echo $RESP | jq -r '.attempts') attempts"
            exit 1
          fi
          echo "Healthy after $(echo $RESP | jq -r '.attempts') attempts ($(echo $RESP | jq -r '.duration_ms')ms)"

  - id: gate
    label: "Approval Gate"
    depends_on:
      - deploy
    timeout_secs: 3600
    steps:
      - type: bash
        id: approval-gate
        label: "Waiting for approval..."
        command: |
          echo "Preview deployed — waiting for approval to promote to production."
          echo "Approve at: ${{ variables.API_URL }}/v1/pipeline-runs/$PIPELINE_RUN_ID/approve"
          for i in $(seq 1 360); do
            EVENTS=$(curl -sf "${{ variables.API_URL }}/v1/pipeline-runs/$PIPELINE_RUN_ID/events/history" \
              -H "x-api-key: ${{ variables.DEPLOY_TOKEN }}")
            APPROVED=$(echo "$EVENTS" | jq -r '.data[] | select(.kind == "approval_granted") | .kind' | head -1)
            if [ "$APPROVED" = "approval_granted" ]; then
              echo "Approved! Proceeding to promote."
              exit 0
            fi
            sleep 10
          done
          echo "ERROR: Approval timed out after 1 hour"
          exit 1

  - id: promote
    label: "Promote to Production"
    depends_on:
      - gate
    steps:
      - type: bash
        id: promote-slot
        label: "Swap traffic to new slot"
        command: |
          curl -sf -X POST \
            "${{ variables.API_URL }}/v1/apps/${{ variables.APP_ID }}/environments/${{ variables.ENV_NAME }}/slots/${{ variables.SLOT_NAME }}/promote" \
            -H "x-api-key: ${{ variables.DEPLOY_TOKEN }}" \
          | jq .
          echo "Promoted ${{ variables.SLOT_NAME }} to production"

finally:
  - id: cleanup-on-failure
    run_on: on_failure
    steps:
      - type: bash
        id: delete-slot
        label: "Delete failed preview slot"
        command: |
          curl -sf -X DELETE \
            "${{ variables.API_URL }}/v1/apps/${{ variables.APP_ID }}/environments/${{ variables.ENV_NAME }}/slots/${{ variables.SLOT_NAME }}" \
            -H "x-api-key: ${{ variables.DEPLOY_TOKEN }}" \
          || echo "Slot cleanup failed (may not exist)"
          rm -f /tmp/tweety-deploy.tar.gz
